spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/interview_mock_coach
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4.1-mini
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
rag:
  enabled: true
  top-k: 6
  similarity-threshold: 0.72
  chunk-size: 700
  chunk-overlap: 120
