spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/interview_mock_coach
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
ai:
  mode: ${AI_MODE:openai}
  openai:
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY:}
    model: deepseek-chat
    temperature: 0.3
    timeout-seconds: 15
rag:
  enabled: true
  top-k: 6
  similarity-threshold: 0.72
  chunk-size: 700
  chunk-overlap: 120