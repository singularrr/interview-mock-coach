spring:
  application:
    name: interview-mock-coach
  datasource:
    url: jdbc:h2:mem:interview_mock_coach;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080
ai:
  mode: mock
  openai:
    base-url: https://api.openai.com/v1
    api-key: ""
    model: gpt-4.1-mini
    temperature: 0.3
logging:
  level:
    root: INFO
    com.example.interviewmockcoach: DEBUG
