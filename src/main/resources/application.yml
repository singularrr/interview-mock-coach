spring:
  application:
    name: interview-mock-coach
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:h2:mem:interview_mock_coach;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
server:
  port: 8081
ai:
  mode: ${AI_MODE:mock}
  openai:
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY:}
    model: deepseek-chat
    temperature: 0.3
    timeout-seconds: 15
rag:
  enabled: false
  top-k: 4
  similarity-threshold: 0.75
  chunk-size: 500
  chunk-overlap: 80
  vector-store:
    collection-name: interview_knowledge_chunks
logging:
  level:
    root: INFO
    com.example.interviewmockcoach: DEBUG